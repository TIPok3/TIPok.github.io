  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      background-color: #0B1E33;
      overflow-x: hidden;
    }
    /* Анимированный фон с большими пузырьками */
    .bubbles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }
    .bubble {
      position: absolute;
      background: rgba(0, 255, 148, 0.15);
      border-radius: 50%;
      filter: blur(40px);
      animation: floatBubble 20s infinite ease-in-out;
    }
    @keyframes floatBubble {
      0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
      25% { transform: translate(5%, 5%) scale(1.1); opacity: 0.4; }
      50% { transform: translate(10%, -5%) scale(0.9); opacity: 0.2; }
      75% { transform: translate(-5%, 10%) scale(1.2); opacity: 0.4; }
      100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
    }
    /* Маленькие плавающие точки */
    .floating-dots {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }
    .dot {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(0, 255, 148, 0.3);
      border-radius: 50%;
      animation: float 3s infinite ease-in-out;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-30px); }
    }
    /* Свечение маскота */
    .mascot-glow {
      animation: glow 3s infinite alternate;
    }
    @keyframes glow {
      from { filter: drop-shadow(0 0 5px #00FF94); }
      to { filter: drop-shadow(0 0 20px #00FF94); }
    }
    /* Анимации для маскота */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    /* Подмигивание (только левый глаз) */
    @keyframes wink {
      0%, 80%, 100% { transform: scaleY(1); }
      85% { transform: scaleY(0.1); }
    }
    /* Махание пальцем */
    @keyframes pointWave {
      0%, 100% { transform: rotate(0deg) translateX(0); }
      50% { transform: rotate(3deg) translateX(2px); }
    }
    .mascot-container {
      animation: float 4s ease-in-out infinite;
    }
    .mascot-eye-left {
      animation: wink 6s infinite;
      transform-origin: center;
      transform-box: fill-box;
    }
    .mascot-antenna {
      animation: antennaWave 3s ease-in-out infinite;
      transform-origin: 60px 10px;
    }
    @keyframes antennaWave {
      0%, 100% { transform: rotate(-2deg); }
      50% { transform: rotate(2deg); }
    }
    /* Указывающий палец */
    .pointing-finger {
      animation: pointWave 2.5s infinite ease-in-out;
      transform-origin: 90px 40px;
    }
    /* Анимация для фигур тем */
    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(3deg); }
      75% { transform: rotate(-3deg); }
    }
    .topic-figure {
      animation: wiggle 3s infinite ease-in-out;
    }
    /* Стили для карточек выбора темы */
    .topic-card {
      background: linear-gradient(145deg, rgba(0,255,148,0.15) 0%, rgba(45,126,231,0.15) 100%);

      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      box-shadow: 0 20px 30px -10px rgba(0,0,0,0.5);
    }
    .topic-card:hover {
      border-color: #00FF94;
      box-shadow: 0 0 30px rgba(0,255,148,0.4), 0 20px 30px -10px rgba(0,0,0,0.5);
      transform: translateY(-8px);
    }
    .topic-card:hover .topic-figure {
      animation: wiggle 1s infinite;
    }
    .topic-button {
      background: linear-gradient(135deg, #00FF94, #2D7EE7);
      color: #0B1E33;
      font-weight: 700;
      font-size: 1.5rem;
      padding: 0.75rem 2rem;
      border-radius: 60px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      max-width: 200px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);

    .topic-button:hover {
      transform: scale(1.05);

      background: white;
      color: #0B1E33;

    /* Стили для скролла */
    #app {

    }

    }
  </style>

        { question: "Какой способ блокировки экрана самый надёжный?", options: ["Графический ключ", "PIN-код 1234", "Длинный пароль", "Отпечаток пальца"], correct: 2, explanation: "Длинный пароль сложнее подобрать, чем графический ключ или короткий PIN. Биометрия удобна, но не защищает от государства." },

        { question: "Что такое VPN?", options: ["Вид вируса", "Сервис для скрытия IP и шифрования трафика", "Программа для ускорения интернета", "Антивирус"], correct: 1, explanation: "VPN шифрует ваш трафик и скрывает реальный IP, но бесплатные VPN могут быть опасны." },
        { question: "Звонок из 'службы безопасности банка' — что делать?", options: ["Назвать данные карты", "Перезвонить в банк по номеру на карте", "Перевести деньги на безопасный счёт", "Следовать инструкциям"], correct: 1, explanation: "Положите трубку и сами перезвоните в банк по номеру с обратной стороны карты." },
        { question: "Нужен ли антивирус на современном iPhone?", options: ["Да, обязательно", "Нет, iOS достаточно защищена, если не делать джейлбрейк", "Только платный", "Качает батарею"], correct: 1, explanation: "iOS имеет встроенную защиту, и приложения из App Store проверяются. Антивирус не нужен, если вы не устанавливаете пиратские приложения." },

        { type: "email", from: "support@appl-suport.com", subject: "Подтвердите свой Apple ID", message: "Здравствуйте!\n\nМы обнаружили подозрительную активность в вашем аккаунте Apple ID. Для подтверждения владения аккаунтом перейдите по ссылке и введите свой логин и пароль:\n\nhxxps://appl-suport.com/verify\n\nЕсли вы не подтвердите аккаунт в течение 24 часов, он будет заблокирован.\n\nС уважением,\nКоманда Apple", isScam: true, redFlags: ["Опечатка в домене (appl-suport вместо apple.com)", "Требование срочных действий", "Запрос логина и пароля по ссылке", "Угроза блокировки"], explanation: "Поддельный email! Apple никогда не просит пароль по ссылке. Официальный домен Apple — apple.com. Опечатка в домене (appl-suport) — явный признак фишинга." },

    // ==================== НОВАЯ ОЗВУЧКА ЧЕРЕЗ EDGE-TTS ====================
    let currentAudio = null;           // текущий элемент Audio
    let currentSpeakingStepId = null;  // идентификатор озвучиваемого шага (currentTopic + '_' + learningStep)

    // Остановка воспроизведения
    function stopSpeechEdge() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }
      currentSpeakingStepId = null;
    }

    // Асинхронная генерация и воспроизведение речи через Edge-TTS
    async function speakTextEdge(text) {
      // Останавливаем предыдущее
      stopSpeechEdge();

      if (!text.trim() || typeof EdgeTTS === 'undefined') {
        console.warn('Edge-TTS недоступен или текст пуст');
        return;
      }

      try {
        const communicate = new EdgeTTS.Communicate(text, {
          voice: 'ru-RU-DariyaNeural',  // естественный женский голос
          rate: 0.9,
          volume: 1.0
        });

        const audioChunks = [];
        for await (const chunk of communicate.stream()) {
          if (chunk.type === 'audio' && chunk.data) {
            audioChunks.push(chunk.data);
          }
        }

        if (audioChunks.length === 0) {
          console.warn('Не удалось получить аудиоданные');
          return;
        }

        const audioBlob = new Blob(audioChunks, { type: 'audio/mpeg' });
        const audioUrl = URL.createObjectURL(audioBlob);
        const audio = new Audio(audioUrl);

        // При окончании очищаем ссылку и сбрасываем состояние
        audio.addEventListener('ended', () => {
          URL.revokeObjectURL(audioUrl);
          if (currentAudio === audio) {
            currentAudio = null;
            currentSpeakingStepId = null;
          }
        });

        // При ошибке тоже очищаем
        audio.addEventListener('error', () => {
          URL.revokeObjectURL(audioUrl);
          if (currentAudio === audio) {
            currentAudio = null;
            currentSpeakingStepId = null;
          }
        });

        currentAudio = audio;
        await audio.play();
      } catch (err) {
        console.error('Ошибка при озвучке через Edge-TTS:', err);
        // Если Edge-TTS не сработал, можно включить fallback на Web Speech API, но пока просто игнорируем
      }
    }

    // Озвучить текущий шаг обучения (с toggle)
    window.speakCurrentStep = function() {
      const stepId = currentTopic + '_' + learningStep;

      // Если уже озвучивается этот же шаг — останавливаем
      if (currentSpeakingStepId === stepId) {
        stopSpeechEdge();
        return;
      }

      // Останавливаем любое другое воспроизведение
      stopSpeechEdge();

      // Собираем текст шага
      let steps;
      if (currentTopic === 'phone') steps = phoneSteps;
      else if (currentTopic === 'internet') steps = internetSteps;
      else steps = computerSteps;
      const step = steps[learningStep];
      const plainContent = step.content.replace(/<[^>]*>/g, ''); // удаляем HTML
      const textToSpeak = step.title + '. ' + plainContent;

      // Запоминаем, что озвучивается этот шаг
      currentSpeakingStepId = stepId;
      speakTextEdge(textToSpeak);
    };

                      onclick="event.stopPropagation(); speakCurrentStep();"
                      title="Озвучить / Остановить">
                <i data-lucide="volume-2" class="w-5 h-5 text-white"></i>
              </button>

              <div class="flex flex-col items-center text-center">
                <div class="p-3 gradient-bg rounded-xl mb-4">
                  <i data-lucide="${step.icon}" class="w-12 h-12 text-[#00FF94]"></i>
                </div>
                <h3 class="text-2xl lg:text-3xl font-bold text-[#00FF94] mb-4">${step.title}</h3>
                <div class="text-white/90 text-base leading-relaxed text-left">${step.content}</div>
              </div>
            </div>
            <div class="flex justify-center gap-4">
              ${learningStep > 0 ? `<button class="px-8 py-4 bg-white/10 border border-white/20 rounded-xl text-lg font-semibold text-white hover:bg-[#2D7EE7] transition-all" onclick="prevStep()"><i data-lucide="arrow-left" class="inline mr-2"></i>Назад</button>` : ''}
              ${!isLast ? `<button class="px-8 py-4 bg-gradient-to-r from-[#00FF94] to-[#2D7EE7] text-[#0B1E33] rounded-xl text-lg font-semibold hover:shadow-lg hover:shadow-[#00FF94]/50 transition-all" onclick="nextStep()">Далее <i data-lucide="arrow-right" class="inline ml-2"></i></button>` : `<button class="px-8 py-4 bg-gradient-to-r from-[#00FF94] to-[#2D7EE7] text-[#0B1E33] rounded-xl text-lg font-semibold hover:shadow-lg hover:shadow-[#00FF94]/50 transition-all" onclick="finishLearning()">Завершить</button>`}
            </div>
          </div>
        </div>
      `;
    }

    function renderQuiz() {
      const q = quizState.questions[quizState.currentQuestion];
      const progress = ((quizState.currentQuestion + 1) / quizState.questions.length) * 100;
      if (quizState.currentQuestion >= quizState.questions.length) {
        return renderQuizResult();
      }
      return `
        <div class="min-h-screen w-full pt-24 pb-12">
          <div class="w-full px-4 lg:px-8 max-w-4xl mx-auto">
            <div class="mb-8">
              <div class="flex justify-between items-center mb-2">
                <span class="text-white/60">Вопрос ${quizState.currentQuestion + 1} из ${quizState.questions.length}</span>
                <span class="text-[#00FF94] font-semibold">Счёт: ${quizState.score}</span>
              </div>
              <div class="w-full bg-[#1a3150] rounded-full h-3">
                <div class="bg-gradient-to-r from-[#00FF94] to-[#2D7EE7] h-3 rounded-full" style="width: ${progress}%;"></div>
              </div>
            </div>
            <div class="bg-[#1a3150] border border-white/10 rounded-3xl p-8 lg:p-12 mb-8">
              <div class="flex flex-col lg:flex-row gap-8 items-start">
                <div class="flex-1">
                  <h2 class="text-2xl lg:text-3xl font-bold text-white mb-8">${q.question}</h2>
                  <div class="space-y-4">
                    ${q.options.map((opt, idx) => `
                      <button class="quiz-option w-full p-4 rounded-xl text-left transition-all ${quizState.selectedAnswer === null ? 'bg-white/5 hover:bg-white/10 border border-white/10 hover:border-[#00FF94]/50 text-white' : idx === q.correct ? 'bg-[#00FF94]/20 border-2 border-[#00FF94] text-white' : idx === quizState.selectedAnswer ? 'bg-red-500/20 border-2 border-red-500 text-white' : 'bg-white/5 border border-white/10 text-white/50'}" onclick="selectQuizAnswer(${idx})" ${quizState.selectedAnswer !== null ? 'disabled' : ''}>
                        <div class="flex items-center gap-3">
                          ${quizState.selectedAnswer !== null ? (idx === q.correct ? '<i data-lucide="check-circle" class="text-[#00FF94] flex-shrink-0" size="24"></i>' : idx === quizState.selectedAnswer ? '<i data-lucide="x-circle" class="text-red-500 flex-shrink-0" size="24"></i>' : '') : ''}
                          <span class="flex-1">${opt}</span>
                        </div>
                      </button>
                    `).join('')}
                  </div>
                </div>
                <div class="lg:w-48 flex justify-center">
                  ${getMascotSVG(quizState.showExplanation ? (quizState.selectedAnswer === q.correct ? 'happy' : 'thinking') : 'pointing', 'w-32 h-32 lg:w-48 lg:h-48')}
                </div>
              </div>
              ${quizState.showExplanation ? `
                <div class="mt-8 p-6 bg-[#0B1E33] rounded-xl border border-[#00FF94]/30">
                  <h3 class="text-[#00FF94] font-semibold mb-2 flex items-center gap-2"><i data-lucide="check-circle" size="20"></i>Объяснение</h3>
                  <p class="text-white/80 leading-relaxed">${q.explanation}</p>
                </div>
              ` : ''}
            </div>
            ${quizState.showExplanation ? `
              <div class="flex justify-center">
                <button class="px-8 py-4 bg-gradient-to-r from-[#00FF94] to-[#2D7EE7] text-[#0B1E33] rounded-xl font-semibold text-lg hover:shadow-lg hover:shadow-[#00FF94]/50 transition-all hover:scale-105" onclick="nextQuizQuestion()">${quizState.currentQuestion < quizState.questions.length - 1 ? 'Следующий вопрос' : 'Завершить'}</button>
              </div>
            ` : ''}
          </div>
        </div>
      `;
    }

    function renderQuizResult() {
      const percent = (quizState.score / quizState.questions.length) * 100;
      return `
        <div class="min-h-screen w-full pt-24 pb-12">
          <div class="w-full px-4 lg:px-8 max-w-2xl mx-auto text-center">
            ${getMascotSVG('happy', 'w-40 h-40 mx-auto mb-8')}
            <div class="bg-[#1a3150] border border-white/10 rounded-3xl p-8 lg:p-12 mb-8">
              <i data-lucide="trophy" class="w-20 h-20 text-[#00FF94] mx-auto mb-6"></i>
              <h1 class="text-4xl lg:text-5xl font-bold text-white mb-4">Квиз завершён!</h1>
              <div class="text-6xl font-bold bg-gradient-to-r from-[#00FF94] to-[#2D7EE7] bg-clip-text text-transparent mb-4">${quizState.score} / ${quizState.questions.length}</div>
              <p class="text-xl text-white/80 mb-8">${percent === 100 ? 'Идеально! Ты настоящий киберэксперт! 🏆' : percent >= 80 ? 'Отлично! Ты хорошо разбираешься в безопасности! 🌟' : percent >= 60 ? 'Хорошо! Но есть куда расти! 💪' : percent >= 40 ? 'Неплохо! Рекомендую пройти материалы ещё раз 📚' : 'Нужно подучиться! Начни с главной страницы 🔄'}</p>
              <div class="w-full bg-[#0B1E33] rounded-full h-4 mb-8">
                <div class="bg-gradient-to-r from-[#00FF94] to-[#2D7EE7] h-4 rounded-full" style="width: ${percent}%;"></div>
              </div>
            </div>
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
              <button class="px-8 py-4 bg-gradient-to-r from-[#00FF94] to-[#2D7EE7] text-[#0B1E33] rounded-xl font-semibold hover:shadow-lg hover:shadow-[#00FF94]/50 transition-all hover:scale-105 flex items-center justify-center gap-2" onclick="restartQuiz()"><i data-lucide="rotate-ccw" size="20"></i>Пройти снова</button>
              <button class="px-8 py-4 bg-white/10 backdrop-blur-sm text-white rounded-xl font-semibold border border-white/20 hover:bg-white/20 hover:border-[#00FF94]/50 transition-all hover:scale-105 flex items-center justify-center gap-2" onclick="goHome()"><i data-lucide="home" size="20"></i>На главную</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderGame() {
      const msg = gameState.messages[gameState.currentMessage];
      if (gameState.currentMessage >= gameState.messages.length) {
        return renderGameResult();
      }
      return `
        <div class="min-h-screen w-full pt-24 pb-12">
          <div class="w-full px-4 lg:px-8 max-w-4xl mx-auto">
            <div class="text-center mb-8">
              <h1 class="text-4xl lg:text-5xl font-bold text-white mb-4">Найди мошенника 🕵️</h1>
              <p class="text-xl text-white/70">Тыкай на подозрительные места и реши — это обман или нет?</p>
            </div>
            <div class="mb-8">
              <div class="flex justify-between items-center mb-2">
                <span class="text-white/60">Сообщение ${gameState.currentMessage + 1} из ${gameState.messages.length}</span>
                <span class="text-[#00FF94] font-semibold">Счёт: ${gameState.score}</span>
              </div>
              <div class="w-full bg-[#1a3150] rounded-full h-3">
                <div class="bg-gradient-to-r from-[#00FF94] to-[#2D7EE7] h-3 rounded-full" style="width: ${((gameState.currentMessage + 1) / gameState.messages.length) * 100}%;"></div>
              </div>
            </div>
            <div class="max-w-md mx-auto">
              <div class="bg-[#1a3150] border-4 border-white/20 rounded-[2.5rem] p-4 shadow-2xl">
                <div class="bg-[#0B1E33] rounded-t-3xl p-4 mb-2">
                  <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-[#00FF94] to-[#2D7EE7] flex items-center justify-center"><i data-lucide="smartphone" size="20" class="text-[#0B1E33]"></i></div>
                    <div class="flex-1">
                      <div class="text-white font-semibold">${msg.from}</div>
                      ${msg.subject ? `<div class="text-white/60 text-sm">${msg.subject}</div>` : ''}
                      <div class="text-white/40 text-xs">${msg.type === 'sms' ? 'SMS' : 'Email'}</div>
                    </div>
                  </div>
                </div>
                <div class="bg-white/5 rounded-2xl p-6 min-h-[300px]">
                  <p class="text-white whitespace-pre-line leading-relaxed">${msg.message}</p>
                </div>
              </div>
            </div>
            ${!gameState.showResult ? `
              <div class="flex flex-col sm:flex-row gap-4 justify-center mt-8">
                <button class="px-8 py-4 bg-red-500/20 border-2 border-red-500 text-white rounded-xl font-semibold hover:bg-red-500/30 transition-all hover:scale-105 flex items-center justify-center gap-2" onclick="selectGameAnswer(true)"><i data-lucide="alert-triangle" size="20"></i>Это мошенники</button>
                <button class="px-8 py-4 bg-[#00FF94]/20 border-2 border-[#00FF94] text-white rounded-xl font-semibold hover:bg-[#00FF94]/30 transition-all hover:scale-105 flex items-center justify-center gap-2" onclick="selectGameAnswer(false)"><i data-lucide="check-circle" size="20"></i>Всё нормально</button>
              </div>
            ` : ''}
            ${gameState.showResult ? `
              <div class="mt-8">
                <div class="p-6 rounded-2xl border-2 ${(gameState.selectedAnswer === msg.isScam) ? 'bg-[#00FF94]/10 border-[#00FF94]' : 'bg-red-500/10 border-red-500'}">
                  <div class="flex items-center gap-3 mb-4">
                    ${(gameState.selectedAnswer === msg.isScam) ? '<i data-lucide="check-circle" class="text-[#00FF94]" size="32"></i>' : '<i data-lucide="x-circle" class="text-red-500" size="32"></i>'}
                    <h3 class="text-2xl font-bold text-white">${(gameState.selectedAnswer === msg.isScam) ? 'Правильно!' : 'Неправильно!'}</h3>
                  </div>
                  <p class="text-white/80 mb-4 leading-relaxed">${msg.explanation}</p>
                  ${msg.isScam && msg.redFlags.length > 0 ? `
                    <div class="mt-4 p-4 bg-[#0B1E33] rounded-xl">
                      <h4 class="text-[#00FF94] font-semibold mb-2 flex items-center gap-2"><i data-lucide="alert-triangle" size="18"></i>Красные флаги:</h4>
                      <ul class="space-y-1">${msg.redFlags.map(f => `<li class="text-white/70 text-sm flex items-start gap-2"><span class="text-red-500 mt-1">•</span><span>${f}</span></li>`).join('')}</ul>
                    </div>
                  ` : ''}
                  <button class="mt-6 w-full px-8 py-4 bg-gradient-to-r from-[#00FF94] to-[#2D7EE7] text-[#0B1E33] rounded-xl font-semibold hover:shadow-lg hover:shadow-[#00FF94]/50 transition-all hover:scale-105" onclick="nextGameMessage()">${gameState.currentMessage < gameState.messages.length - 1 ? 'Следующее сообщение' : 'Завершить'}</button>
                </div>
              </div>
            ` : ''}
            <div class="flex justify-center mt-8">
              ${getMascotSVG(gameState.showResult ? (gameState.selectedAnswer === msg.isScam ? 'happy' : 'thinking') : 'winking', 'w-32 h-32')}
            </div>
          </div>
        </div>
      `;
    }

    function renderGameResult() {
      const percent = (gameState.score / gameState.messages.length) * 100;
      return `
        <div class="min-h-screen w-full pt-24 pb-12">
          <div class="w-full px-4 lg:px-8 max-w-2xl mx-auto text-center">
            ${getMascotSVG('happy', 'w-40 h-40 mx-auto mb-8')}
            <div class="bg-[#1a3150] border border-white/10 rounded-3xl p-8 lg:p-12 mb-8">
              <i data-lucide="alert-triangle" class="w-20 h-20 text-[#00FF94] mx-auto mb-6"></i>
              <h1 class="text-4xl lg:text-5xl font-bold text-white mb-4">Детектив завершён!</h1>
              <div class="text-6xl font-bold bg-gradient-to-r from-[#00FF94] to-[#2D7EE7] bg-clip-text text-transparent mb-4">${gameState.score} / ${gameState.messages.length}</div>
              <p class="text-xl text-white/80 mb-8">${percent === 100 ? 'Идеально! Ты — настоящий детектив мошенничества! 🕵️' : percent >= 75 ? 'Отлично! Мошенникам будет сложно тебя обмануть! 🌟' : percent >= 50 ? 'Хорошо! Но будь внимательнее! 👀' : 'Нужно быть осторожнее! Пройди ещё раз! 🔄'}</p>
              <div class="w-full bg-[#0B1E33] rounded-full h-4 mb-8">
                <div class="bg-gradient-to-r from-[#00FF94] to-[#2D7EE7] h-4 rounded-full" style="width: ${percent}%;"></div>
              </div>
            </div>
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
              <button class="px-8 py-4 bg-gradient-to-r from-[#00FF94] to-[#2D7EE7] text-[#0B1E33] rounded-xl font-semibold hover:shadow-lg hover:shadow-[#00FF94]/50 transition-all hover:scale-105 flex items-center justify-center gap-2" onclick="restartGame()"><i data-lucide="rotate-ccw" size="20"></i>Пройти снова</button>
              <button class="px-8 py-4 bg-white/10 backdrop-blur-sm text-white rounded-xl font-semibold border border-white/20 hover:bg-white/20 hover:border-[#00FF94]/50 transition-all hover:scale-105 flex items-center justify-center gap-2" onclick="goHome()"><i data-lucide="home" size="20"></i>На главную</button>
            </div>
          </div>
        </div>
      `;
    }

    // ========== НАВИГАЦИОННЫЕ ФУНКЦИИ (с остановкой речи) ==========
    window.navigateTo = function(screen) {
      stopSpeechEdge();
      if (screen === 'quiz') {
        quizState.currentQuestion = 0;
        quizState.selectedAnswer = null;
        quizState.showExplanation = false;
        quizState.score = 0;
        currentScreen = 'quiz';
      } else if (screen === 'game') {
        gameState.currentMessage = 0;
        gameState.selectedAnswer = null;
        gameState.showResult = false;
        gameState.score = 0;
        currentScreen = 'game';
      } else {
        currentScreen = screen;
      }
      renderScreen();
    };

    window.goHome = function() {
      stopSpeechEdge();
      currentScreen = 'home';
      renderScreen();
    };

    window.goBack = function() {
      stopSpeechEdge();
      if (currentScreen === 'learning') {
        currentScreen = 'topicSelect';
        renderScreen();
      } else {
        goHome();
      }
    };

    window.startLearning = function(topic) {
      stopSpeechEdge();
      currentTopic = topic;
      learningStep = 0;
      currentScreen = 'learning';
      renderScreen();
    };

    window.nextStep = function() {
      stopSpeechEdge();
      let steps;
      if (currentTopic === 'phone') steps = phoneSteps;
      else if (currentTopic === 'internet') steps = internetSteps;
      else steps = computerSteps;
      if (learningStep < steps.length - 1) {
        learningStep++;
        renderScreen();
      }
    };

    window.prevStep = function() {
      stopSpeechEdge();
      if (learningStep > 0) {
        learningStep--;
        renderScreen();
      }
    };

    window.finishLearning = function() {
      stopSpeechEdge();
      currentScreen = 'topicSelect';
      renderScreen();
    };

    window.selectQuizAnswer = function(idx) {
      if (quizState.selectedAnswer !== null) return;
      quizState.selectedAnswer = idx;
      quizState.showExplanation = true;
      if (idx === quizState.questions[quizState.currentQuestion].correct) {
        quizState.score++;
      }
      renderScreen();
    };

    window.nextQuizQuestion = function() {
      if (quizState.currentQuestion < quizState.questions.length - 1) {
        quizState.currentQuestion++;
        quizState.selectedAnswer = null;
        quizState.showExplanation = false;
      } else {
        quizState.currentQuestion = quizState.questions.length;
      }
      renderScreen();
    };

    window.restartQuiz = function() {
      stopSpeechEdge();
      quizState.currentQuestion = 0;
      quizState.selectedAnswer = null;
      quizState.showExplanation = false;
      quizState.score = 0;
      renderScreen();
    };

    window.selectGameAnswer = function(isScam) {
      if (gameState.selectedAnswer !== null) return;
      gameState.selectedAnswer = isScam;
      gameState.showResult = true;
      if (isScam === gameState.messages[gameState.currentMessage].isScam) {
        gameState.score++;
      }
      renderScreen();
    };

    window.nextGameMessage = function() {
      if (gameState.currentMessage < gameState.messages.length - 1) {
        gameState.currentMessage++;
        gameState.selectedAnswer = null;
        gameState.showResult = false;
      } else {
        gameState.currentMessage = gameState.messages.length;
      }
      renderScreen();
    };

    window.restartGame = function() {
      stopSpeechEdge();
      gameState.currentMessage = 0;
      gameState.selectedAnswer = null;
      gameState.showResult = false;
      gameState.score = 0;
      renderScreen();
    };

    // Обработчики UI
    document.getElementById('mobileMenuBtn').addEventListener('click', () => {
      const nav = document.getElementById('mobileNav');
      nav.classList.toggle('hidden');
    });

    document.getElementById('logo').addEventListener('click', goHome);

    renderScreen();
  </script>
</body>
</html>
